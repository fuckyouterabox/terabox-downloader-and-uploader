name: TeraBox Download & Upload Accelerator

on:
  workflow_dispatch:
    inputs:
      url_1:
        description: 'URL 1 de descarga (HTTP/HTTPS)'
        required: true
        type: string
      url_2:
        description: 'URL 2 de descarga (Opcional)'
        required: false
        type: string
      url_3:
        description: 'URL 3 de descarga (Opcional)'
        required: false
        type: string
      url_4:
        description: 'URL 4 de descarga (Opcional)'
        required: false
        type: string
      url_5:
        description: 'URL 5 de descarga (Opcional)'
        required: false
        type: string
      subfolder_path:
        description: 'Subcarpeta dentro de Archive/Firmware/ (ej. Samsung/Galaxy o dejar vacío para la raíz)'
        required: false
        default: ''
        type: string

jobs:
  transfer-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias (aria2 y Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3-pip

      - name: Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librería de TeraBox
        run: pip install requests terabox-api

      - name: Descargar archivos con aria2c (Acelerador)
        env:
          # Pasamos las URLs como variables de entorno al script de bash
          URL1: ${{ inputs.url_1 }}
          URL2: ${{ inputs.url_2 }}
          URL3: ${{ inputs.url_3 }}
          URL4: ${{ inputs.url_4 }}
          URL5: ${{ inputs.url_5 }}
        run: |
          mkdir -p ./download_dir
          cd ./download_dir
          
          # Creamos un arreglo con todas las URLs proporcionadas
          URLS=("$URL1" "$URL2" "$URL3" "$URL4" "$URL5")
          
          # Recorremos el arreglo y descargamos si la URL no está vacía
          for URL in "${URLS[@]}"; do
            if [ -n "$URL" ]; then
              echo "========================================="
              echo "Iniciando descarga de: $URL"
              echo "========================================="
              
              aria2c --max-connection-per-server=16 \
                     --split=16 \
                     --min-split-size=1M \
                     --continue=true \
                     --content-disposition-default-utf8=true \
                     "$URL"
            fi
          done
                 
          echo "========================================="
          echo "Contenido total descargado listo para subir:"
          ls -la
          echo "========================================="

      - name: Construir ruta destino y Subir archivos a TeraBox
        env:
          TERABOX_COOKIE: ${{ secrets.TERABOX_COOKIE }}
          USER_PATH: ${{ inputs.subfolder_path }}
        run: |
          # Limpiamos el input del usuario para evitar barras duplicadas
          CLEAN_USER_PATH="${USER_PATH#/}"
          CLEAN_USER_PATH="${CLEAN_USER_PATH%/}"
          
          # Construimos la ruta forzada
          if [ -z "$CLEAN_USER_PATH" ]; then
            FINAL_DEST="/Archive/Firmware"
          else
            FINAL_DEST="/Archive/Firmware/$CLEAN_USER_PATH"
          fi
          
          echo "La ruta forzada final en TeraBox será: $FINAL_DEST"
          
          # Ejecutamos el script de Python. Subirá TODOS los archivos en ./download_dir a FINAL_DEST
          python scripts/upload_to_terabox.py "./download_dir" "$FINAL_DEST"
