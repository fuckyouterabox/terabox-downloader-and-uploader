name: TeraBox Node.js Download & Upload Accelerator

on:
  workflow_dispatch:
    inputs:
      url_1:
        description: 'URL 1 de descarga'
        required: true
        type: string
      # Puedes agregar url_2, url_3, etc. igual que antes

jobs:
  transfer-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar aria2
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del script
        run: npm install axios form-data

      - name: Procesar, Descargar y Subir
        env:
          TERABOX_COOKIE: ${{ secrets.TERABOX_COOKIE }}
          URL1: ${{ inputs.url_1 }}
        run: |
          URLS=("$URL1")
          COUNTER=1
          
          for URL in "${URLS[@]}"; do
            if [ -n "$URL" ]; then
              echo "======================================================"
              echo "PROCESANDO URL $COUNTER: $URL"
              echo "======================================================"
              
              PATH_WITHOUT_DOMAIN=$(echo "$URL" | sed 's|https\?://[^/]\+/||')
              URL_DIR=$(dirname "$PATH_WITHOUT_DOMAIN")
              
              if [ "$URL_DIR" = "." ]; then
                FINAL_DEST="/Archive"
              else
                FINAL_DEST="/Archive/$URL_DIR"
              fi
              
              LOCAL_DIR="./download_dir/url_$COUNTER"
              mkdir -p "$LOCAL_DIR"
              
              echo "-> Descargando con aria2c..."
              aria2c --dir="$LOCAL_DIR" \
                     --max-connection-per-server=16 \
                     --split=16 \
                     --min-split-size=1M \
                     --continue=true \
                     --content-disposition-default-utf8=true \
                     "$URL"
              
              echo "-> Troceando archivos gigantes para evitar el error 413..."
              cd "$LOCAL_DIR"
              # Divide cualquier archivo mayor a 3GB en partes de 3000 MB
              find . -type f -size +3G -exec split -b 3000M {} "{}.part" \;
              # Borra el archivo original gigante para que Node no intente subirlo
              find . -type f -size +3G -delete
              cd ../../
                     
              echo "-> Iniciando subida a TeraBox con Node.js..."
              node scripts/upload_to_terabox.js "$LOCAL_DIR" "$FINAL_DEST"
              
            fi
            ((COUNTER++))
          done
